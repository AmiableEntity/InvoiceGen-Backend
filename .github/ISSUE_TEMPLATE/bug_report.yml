name: Bug Report
description: Report a bug in the backend API
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please include as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: request
    attributes:
      label: Request details
      description: Endpoint, method, and request body (redact any secrets)
      placeholder: |
        POST /api/invoices
        Body: { "title": "..." }
    validations:
      required: true

  - type: textarea
    id: response
    attributes:
      label: Actual response
      placeholder: Status code + response body
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected response
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 20.12.0
